<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мой рисовый дневник — Rice World</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">🍚 Rice World</a>
      <nav id="main-nav" class="main-nav">
        <ul class="nav-list">
          <li><a href="index.html">Главная</a></li>
          <li><a href="varieties.html">Сорта</a></li>
          <li><a href="recipes.html">Рецепты</a></li>
          <li><a href="calculator.html">Калькулятор</a></li>
          <li><a href="diary.html" class="active">Дневник</a></li>
          <li><a href="about.html">О проекте</a></li>
        </ul>
      </nav>
      <button id="theme-toggle" class="theme-toggle" aria-label="Переключить тему">
        <span class="icon-light">☀️</span>
        <span class="icon-dark">🌙</span>
      </button>
      <button id="burger-btn" class="burger-btn" aria-label="Меню">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="site-main">
    <div class="container">
      <h1>Мой рисовый дневник</h1>
      <p>Записывайте, какие блюда с рисом вы пробовали, и ведите личную коллекцию.</p>

      <form id="diary-form" class="diary-form">
        <div class="form-group">
          <label for="entry-title">Название блюда</label>
          <input type="text" id="entry-title" required placeholder="Например, плов">
        </div>
        <div class="form-group">
          <label for="entry-date">Дата</label>
          <input type="date" id="entry-date" required>
        </div>
        <div class="form-group">
          <label for="entry-text">Описание</label>
          <textarea id="entry-text" rows="3" placeholder="Вкус, впечатления..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Добавить запись</button>
      </form>

      <div id="diary-list" class="diary-list">
        <!-- Записи будут добавляться динамически -->
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2025 Rice World. Учебный проект.</p>
    </div>
  </footer>

  <script src="js/theme.js" defer></script>
  <script src="js/diary.js" defer></script>
  <script src="js/burger.js" defer></script>
</body>
</html>
